<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artilharia</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --muted:#334155;
  --text:#e5e7eb;
  --green:#22c55e;
  --blue:#3b82f6;
  --danger:#ef4444;
  --gold:#facc15;
  --silver:#cbd5e1;
  --bronze:#f59e0b;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:500px;
  padding:12px;
}

/* HEADER */
h2{
  text-align:center;
  margin-bottom:12px;
}

/* FORM */
.form{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

.form input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

.form button{
  background:var(--green);
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
}

/* LISTA */
.lista{
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:14px;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* TOP 3 */
.top1{border-left:5px solid var(--gold)}
.top2{border-left:5px solid var(--silver)}
.top3{border-left:5px solid var(--bronze)}

.info{
  display:flex;
  flex-direction:column;
}

.nome{
  font-weight:bold;
  cursor:pointer;
}

.gols{
  font-size:14px;
  color:#aaa;
}

/* BOTÕES */
.actions button{
  margin-left:4px;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.plus{background:var(--green)}
.minus{background:#64748b}
.del{background:var(--danger)}

/* COPY */
.copy{
  margin-top:10px;
  width:100%;
  background:var(--blue);
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>⚽ Artilharia</h2>

<div class="form">
  <input type="text" id="nome" placeholder="Nome">
  <input type="number" id="gols" value="0">
  <button onclick="addPlayer()">+</button>
</div>

<div id="lista" class="lista"></div>

<button class="copy" onclick="copiar()">Copiar para WhatsApp</button>

</div>

<script>
let jogadores = [];
let sha = "";

// API
async function carregar(){
  const res = await fetch("https://pelada-fia2026.vercel.app/api/dados");
  const data = await res.json();

  jogadores = data.content || [];
  sha = data.sha;

  render();
}

async function salvar(){
  await fetch("https://pelada-fia2026.vercel.app/api/dados", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ jogadores, sha })
  });
}

// UI
function ordenar(){
  jogadores.sort((a,b)=>b.gols - a.gols);
}

function render(){
  ordenar();

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  jogadores.forEach((j,i)=>{
    const div = document.createElement("div");

    let classe = "";
    if(i===0) classe="top1";
    else if(i===1) classe="top2";
    else if(i===2) classe="top3";

    div.className = "card "+classe;

    div.innerHTML = `
      <div class="info">
        <span class="nome" ondblclick="editar('${j.id}')">
          ${i+1}. ${j.nome}
        </span>
        <span class="gols">${j.gols} gols</span>
      </div>

      <div class="actions">
        <button class="plus" onclick="mais('${j.id}')">+</button>
        <button class="minus" onclick="menos('${j.id}')">-</button>
        <button class="del" onclick="remover('${j.id}')">x</button>
      </div>
    `;

    lista.appendChild(div);
  });
}

// ações
function addPlayer(){
  const nome = document.getElementById("nome").value.trim();
  const gols = parseInt(document.getElementById("gols").value) || 0;

  if(!nome) return;

  jogadores.push({
    id: Date.now().toString(),
    nome,
    gols
  });

  document.getElementById("nome").value="";
  document.getElementById("gols").value=0;

  render();
  salvar();
}

function mais(id){
  const j = jogadores.find(j=>j.id===id);
  j.gols++;
  render();
  salvar();
}

function menos(id){
  const j = jogadores.find(j=>j.id===id);
  j.gols = Math.max(0, j.gols-1);
  render();
  salvar();
}

function remover(id){
  if(!confirm("Remover?")) return;
  jogadores = jogadores.filter(j=>j.id!==id);
  render();
  salvar();
}

function editar(id){
  const j = jogadores.find(j=>j.id===id);
  const novo = prompt("Editar nome:", j.nome);
  if(novo){
    j.nome = novo;
    render();
    salvar();
  }
}

function copiar(){
  ordenar();

  let texto = "*Artilharia*\n\n";

  jogadores.forEach((j,i)=>{
    texto += `${i+1}. ${j.nome} - ${j.gols}\n`;
  });

  navigator.clipboard.writeText(texto);
  alert("Copiado!");
}

// init
carregar();
</script>

</body>
</html>
